version: "3.9"

volumes:
  ollama-data:
  redis_data:


networks:
  app-network:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: osce-backend
    environment:
      - PYTHONPATH=/app/osce-backend
      - DJANGO_DEBUG=False
      - BASE_DIR=/app/osce-backend
    volumes:
      - ./osce-backend:/app/osce-backend
      - ./db:/app/osce-backend/db
      - ./log:/app/osce-backend/log
    working_dir: /app/osce-backend
    command: >
      bash -c "
        python3.13 manage.py collectstatic --noinput --settings=backend_api.settings 
        python3.13 manage.py makemigrations &&  python3.13 manage.py migrate --noinput
        exec gunicorn backend_api.wsgi:application --bind 0.0.0.0:8000 --workers 3
        "
    ports:
      - "8001:8000"
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - ./osce-frontend:/app/osce-frontend
      - ./dist:/app/osce-frontend/dist
    command: >
      bash -c " 
            npm run build:admin && 
            npm run build:user"
    networks:
      - app-network

  ai-backend:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: osce-ai-backend
    ports:
      - "8007:8007"
    depends_on:
      - ollama
    environment:
      - DJANGO_GPU_ID=1
      - OLLAMA_URL=http://ollama:11434
      - DJANGO_SETTINGS_MODULE=Linly_Talker_api.settings
      - PYTHONUNBUFFERED=1
      - NUMBA_THREADING_LAYER=workqueue
    volumes:
      # 掛載 checkpoints（避免每次重新下載）
      - ./Linly_Talker_api/Linly-Talker/checkpoints:/app/Linly-Talker/checkpoints
      # 掛載 media（持久化生成的文件）
      - ./Linly_Talker_api/media:/app/media
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '1' ] # 使用 GPU 1
              capabilities: [ gpu ]
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8007/api/health/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ollama:
    image: ollama/ollama:latest
    container_name: osce-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:latest
    container_name: osce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:latest
    container_name: osce-nginx
    ports:
      - "12001:80"
      - "12000:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html
      - ./static:/app/osce-backend/static
      - ./fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - ./privkey.pem:/etc/ssl/private/privkey.pem:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
