name: Ollama AI Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number'
        required: true
        type: number

jobs:
  ollama_review:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Run Ollama code review in file and comment
      id: run_review
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        PR_NUMBER: ${{ github.event.inputs.pr_number }}
        REPO_FULL_NAME: ${{ github.repository }}
      run: |
        set -euo pipefail

        git fetch origin master
        git diff origin/master...HEAD --name-only | grep '\.tsx$' > code_diff_filename.txt

        while IFS= read -r filename
        do
          echo "Processing file: $filename"
          diff_content=$(git diff origin/master...HEAD -- "$filename")

          # JSON escape diff_content safely
          escaped_diff=$(printf '%s' "$diff_content" | jq -Rs .)

          RESPONSE=$(curl -k -s -X POST 'https://118.163.52.174:12003/code-review' \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -d "{\"code_snippet\": $escaped_diff}")

          # JSON escape RESPONSE safely for GitHub API comment
          escaped_resp=$(printf '%s' "$RESPONSE" | jq -Rs .)

          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO_FULL_NAME/issues/$PR_NUMBER/comments" \
            -d "{\"body\": $escaped_resp}"

        done < code_diff_filename.txt
