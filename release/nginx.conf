server {
    listen 80;
    # 導向 HTTPS
    return 301 https://$host:12000$request_uri;
}

server {
    listen 443 ssl;
    server_name 118.163.52.174;

    ssl_certificate     /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;

    # 限制 Nginx 與後端通訊使用 HTTP/1.1，避免 Gunicorn 報錯
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    root /usr/share/nginx/html;
    index index.html;

    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

     location /user/ {
        alias /usr/share/nginx/html/user/;
        try_files $uri $uri/ /user/index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # 告訴 Django 這是 HTTPS
    }

    location /ai-api/ {
        proxy_pass http://ai-backend:8007/;
        
        # --- 延長 Gateway 超時設定 ---
        proxy_connect_timeout 600s;    # 建立連線超時
        proxy_send_timeout    600s;    # 傳送請求超時
        proxy_read_timeout    600s;    # 等待 AI 回傳結果超時 (建議至少 10 分鐘)
        
        # --- 處理大檔案上傳 (如影片、圖片) ---
        client_max_body_size 100M;     
        
        # --- 標準 Header 設定 ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- 停用緩衝 (選配：適合串流輸出如 SSE) ---
        # proxy_buffering off; 
    }

    location /ai-api/media/ {
        alias /app/media/;  # 這裡要對應你 Nginx 容器內掛載 media 的路徑
        expires 7d;         # 設定快取
        add_header Access-Control-Allow-Origin *; # 允許跨域讀取影片
    }

    location /redis/ {
        proxy_pass http://redis:6380/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # 根據你的 Django 日誌，修正靜態路徑映射
    location /static/ {
        alias /app/osce-backend/static/; 
    }
}