server {
    listen 80;
    # 強制將 12001 (HTTP) 的流量導向 12000 (HTTPS)
    return 301 https://$host:12000$request_uri;
}

server {
    listen 443 ssl;
    server_name 118.163.52.174; # 建議填入你的 IP 或網域

    # 憑證路徑必須對應 docker-compose 裡的掛載路徑
    ssl_certificate     /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;

    # SSL 最佳實踐
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # 檢查：你的 dist 目錄下是否有 admin 資料夾？
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /user/ {
        alias /usr/share/nginx/html/user/;
        try_files $uri $uri/ /user/index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/; # 這裡對應 docker-compose 的服務名稱
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/CSMU/backend_api/static/;
    }
}